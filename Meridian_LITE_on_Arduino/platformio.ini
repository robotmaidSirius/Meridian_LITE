; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
build_flags =
#	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_DEBUG
#	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
#	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_WARN
#	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_ERROR
#	-D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
	-D TX1=27
	-D RX1=32
	-D BOARD_SUPPRESSES_WARNINGS
	-D BOARD_SETTING_DEFAULT_SERIAL0_BAUD=115200
#	-D MODULE_FS_EEPROM
#	-D MODULE_FS_SD_CARD
#	-D MODULE_PAD_WIIMOTE
#	-D MODULE_PAD_KRC5FH
#	-D MODULE_AHRS_BNO055
#	-D MODULE_AHRS_MPU6050
monitor_speed = 115200
lib_deps =
	ninagawa123/Meridian@^0.1.0
	adafruit/Adafruit BNO055@^1.5.3
	electroniccats/MPU6050@^0.5.0

board_build.partitions = no_ota.csv

lib_extra_dirs =
	../lib/Meridian
	../lib/3rd_party/Arduino
